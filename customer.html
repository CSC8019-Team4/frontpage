<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whistlestop Coffee Hut - Forest Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/customer.css">
</head>
<body>


    <div class="immersive-header">
        <div class="top-info-bar">
            
            <div class="loc-select-box">
                <i class="fa-solid fa-location-dot"></i>
                <select id="station">
                    <option>Cramlington Station</option>
                    <option>Newcastle Station</option>
                    <option>Morpeth Station</option>
                </select>
                <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i>
            </div>
            <div id="timeBox" class="biz-status-box"></div>
        </div>
        <div class="brand-hero">
            <h1>Whistlestop Coffee Hut</h1>
            <p>Premium Coffee & Artisan Spring Water</p>
        </div>
        <div class="header-curve-mask"></div>
    </div>

    <div class="container">

        <div id="pg-order" class="page active">
            <div class="section-title-group">
                <h2>Menu</h2>
                <div class="gold-underline"></div>
            </div>

            <div id="menu-items"></div>
        </div>


        <div id="pg-record" class="page">

            <div id="login-ui" class="auth-frame-large">
                <div class="auth-header">
                    <i class="fa-solid fa-circle-user"></i>
                    <span>Member Login</span>
                </div>
                <div class="auth-body">
                    <div class="auth-row">
                        <label>Account</label>
                        <input type="text" id="u-acc" placeholder="Email / Phone">
                    </div>
                    <div class="auth-row">
                        <label>Password</label>
                        <input type="password" id="u-pwd" placeholder="Enter password">
                    </div>
                </div>
                <button class="btn-primary-large" onclick="login()">SIGN IN</button>
            </div>


            <div id="member-ui" class="membership-hero-frame" style="display:none;">
                <div class="membership-card-premium">
                    <div class="card-inner-top">
                        <div class="pass-label">
                            <i class="fa-solid fa-leaf"></i>
                            <span>COFFEE PASS</span>
                        </div>
                        <div class="status-pill">GOLD STATUS</div>
                    </div>

                    <div class="loyalty-display-box">
                        <div class="progress-info">
                            <span class="label">Loyalty Progress</span>
                            <span id="cup-text" class="cup-count">0/10 Cups</span>
                        </div>
                        <div class="cup-slots-row" id="cup-grid">

                        </div>
                    </div>

                    <div class="reward-notice">
                        <i class="fa-solid fa-gift"></i>
                        <span>Collect 10 cups to receive a free beverage on us.</span>
                    </div>
                </div>
            </div>


            <div class="history-section">
                <div class="section-heading">Pending Orders</div>
                <div id="pending-orders" class="content-box-isolated">
                    <div class="empty-placeholder">No active orders</div>
                </div>

                <div class="section-heading">Recent History</div>
                <div id="orders-box" class="content-box-isolated">
                    <div class="empty-placeholder">No history found.</div>
                </div>
            </div>
        </div>
    </div>


    <div class="float-pay-bar" id="pay-bar">
        <div class="pay-content">
            <div class="cart-details">
                <i class="fa-solid fa-bag-shopping"></i>
                <span>Bag Total: £<span id="cart-p-bar">0.00</span></span>
            </div>
            <div class="pay-action" onclick="openCart()">
                VIEW CART <i class="fa-solid fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <div id="mask" onclick="closeDrawer()"></div>
    <div id="drawer"></div>
    <div id="cart-overlay" onclick="if(event.target==this) closeCart()"></div>

    <div class="nav-bar-main">
        <div class="nav-item active" onclick="navTo('pg-order')">
            <i class="fa-solid fa-mug-hot"></i>
            <span>Order</span>
        </div>
        <div class="nav-item" onclick="navTo('pg-record')">
            <i class="fa-solid fa-user"></i>
            <span>Account</span>
        </div>
    </div>

    <script src="JS/customer.js"></script>
</body>
</html>
