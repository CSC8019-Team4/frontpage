<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whistlestop Coffee Hut</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="CSS/customer.css">
</head>
<body>

    <!-- Header Section -->
    <div class="header">
        <div class="header-left">
            <div class="loc-select">
                <select id="station">
                    <option>Cramlington Station</option>
                    <option>Newcastle Station</option>
                    <option>Morpeth Station</option>
                </select>
                <i class="fa-solid fa-chevron-down loc-select-icon"></i>
            </div>
            <div id="train-info" class="train-info"></div>
        </div>
        <div id="timeBox" class="biz-hours"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Order Page -->
        <div id="pg-order" class="page active">
            <div id="menu-items"></div>
        </div>

        <!-- Member Profile Page -->
        <div id="pg-record" class="page">
            <!-- Login UI -->
            <div id="login-ui" class="hero-section">
                <p class="login-title">Member Login</p>
                <input type="text" placeholder="Account" id="u-acc" class="login-input">
                <input type="password" placeholder="Password" id="u-pwd" class="login-input">
                <button id="login-btn" class="btn-login">LOGIN</button>
                <button id="register-trigger-btn" class="btn-ghost register-trigger-btn">REGISTER</button>
            </div>

            <!-- Register Modal -->
            <div id="register-modal" class="modal-overlay">
                <div class="register-modal-content">
                    <div class="register-header">
                        <h2 class="register-title">Create Account</h2>
                        <button class="register-close">&times;</button>
                    </div>
                    
                    <div class="register-form-group">
                        <label class="register-label">Account</label>
                        <input id="register-acc" type="text" placeholder="Enter your account" class="register-input">
                        <div id="register-acc-error" class="register-error"></div>
                    </div>
                    
                    <div class="register-form-group">
                        <label class="register-label">Password</label>
                        <input id="register-pwd" type="password" placeholder="Enter your password" class="register-input">
                        <div id="register-pwd-error" class="register-error"></div>
                    </div>
                    
                    <div class="register-form-group">
                        <label class="register-label">Confirm Password</label>
                        <input id="register-confirm-pwd" type="password" placeholder="Confirm your password" class="register-input">
                        <div id="register-confirm-error" class="register-error"></div>
                    </div>
                    
                    <button id="register-submit-btn" class="register-submit-btn">REGISTER</button>
                    <button id="register-cancel-btn" class="register-cancel-btn">Cancel</button>
                </div>
            </div>

            <!-- Member Card (Hidden by default) -->
            <div class="member-card" id="member-ui" style="display:none;">
                <div class="member-card-header">
                    <span class="member-card-title">COFFEE PASS</span>
                    <span id="cup-text" class="cup-count">0/10</span>
                </div>
                <div class="cup-track" id="cup-grid"></div>
                <p class="cup-note">* Buy 9 cups and the 10th one is free.</p>
            </div>

            <!-- Order Detail Modal -->
            <div id="orderModal" class="modal-overlay" style="display:none;">
                <div class="order-modal-content">
                    <div class="order-modal-header">
                        <h3 class="order-modal-title">Order Detail</h3>
                        <button class="order-modal-close">&times;</button>
                    </div>
                    <div id="modalItems" class="order-modal-items"></div>
                    <div class="order-modal-footer"></div>
                </div>
            </div>

         
            <div class="section-label pending-label">Pending Orders</div>
            <div id="pending-orders" class="orders-container">No pending orders</div>

            <!-- Order History Section -->
            <div class="section-label history-label">Orders history</div>
            <div id="orders-box" class="orders-container">No record found.</div>
        </div>
    </div>

    <!-- Floating Payment Bar -->
    <div class="float-pay" id="pay-bar" style="display: none;">
        <div class="pay-info">
            <b class="pay-item-count">0 items</b> 
            <span class="pay-sub">£0.00</span>
        </div>
        <div class="pay-buttons">
            <button id="view-cart-btn" class="pay-btn">View Cart</button>
            <button id="checkout-btn" class="pay-btn">Checkout</button>
        </div>
    </div>


    <div id="mask" class="mask-overlay" style="display: none;"></div>


    <div id="drawer" class="product-drawer" style="bottom: -100%;"></div>


    <div class="nav-bar">
        <div class="nav-item active" data-page="pg-order">
            <i class="fa-solid fa-mug-hot"></i>
            <span>HomePage</span>
        </div>
        <div class="nav-item" data-page="pg-record">
            <i class="fa-solid fa-id-card-clip"></i>
            <span>Me</span>
        </div>
    </div>

    <!-- Scripts (Load in order) -->
    <script src="JS/utils.js"></script>
    <script src="JS/state.js"></script>
    <script src="JS/api.js"></script>
    <script src="JS/customer.js"></script>
</body>
</html>
